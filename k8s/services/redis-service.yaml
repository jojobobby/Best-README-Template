# ClusterIP service for Redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: applybot
  labels:
    app.kubernetes.io/name: applybot
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
