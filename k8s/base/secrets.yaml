# Identity encryption key — used to decrypt the profile stored in the identity PVC
# Generate with: openssl rand -hex 32 | base64
apiVersion: v1
kind: Secret
metadata:
  name: identitykey
  namespace: applybot
  labels:
    app.kubernetes.io/name: applybot
    app.kubernetes.io/component: identity
type: Opaque
data:
  # Replace with: echo -n "your-64-char-hex-key" | base64
  IDENTITY_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
---
# All application secrets — Twilio, APIs, database, etc.
# Replace each value with: echo -n "actual-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: applybot-secrets
  namespace: applybot
  labels:
    app.kubernetes.io/name: applybot
type: Opaque
data:
  # Twilio SMS credentials
  TWILIO_ACCOUNT_SID: REPLACE      # Your Twilio Account SID (starts with AC)
  TWILIO_AUTH_TOKEN: REPLACE        # Your Twilio Auth Token (32 chars)
  TWILIO_FROM_NUMBER: REPLACE       # Your Twilio phone number in E.164 (e.g. +15551234567)
  OWNER_PHONE: REPLACE              # Your personal phone number in E.164

  # Anthropic Claude API
  ANTHROPIC_API_KEY: REPLACE        # Claude API key (starts with sk-ant-)

  # Job scraper APIs
  ADZUNA_APP_ID: REPLACE            # Adzuna API application ID
  ADZUNA_APP_KEY: REPLACE           # Adzuna API application key

  # Database
  DATABASE_URL: REPLACE             # postgresql://user:pass@postgres:5432/applybot?schema=public

  # Redis
  REDIS_URL: REPLACE                # redis://:password@redis:6379

  # API authentication
  API_KEY: REPLACE                  # Min 32 character API key for protected endpoints

  # Bull Board admin dashboard
  BULL_BOARD_USER: REPLACE          # Admin username
  BULL_BOARD_PASS: REPLACE          # Admin password

  # Postgres credentials (for StatefulSet)
  POSTGRES_USER: REPLACE            # Database username
  POSTGRES_PASSWORD: REPLACE        # Database password

  # Redis password
  REDIS_PASSWORD: REPLACE           # Redis authentication password

  # Optional: CAPTCHA solving
  # TWOCAPTCHA_API_KEY: REPLACE     # 2Captcha API key (uncomment if needed)

  # Optional: Workday login
  # WORKDAY_EMAIL: REPLACE          # Workday account email
  # WORKDAY_PASSWORD: REPLACE       # Workday account password

  # Job search configuration (stored as secrets for flexibility)
  GREENHOUSE_COMPANY_SLUGS: REPLACE # Comma-separated company slugs
  LEVER_COMPANY_SLUGS: REPLACE      # Comma-separated company slugs
  SEARCH_KEYWORDS: REPLACE          # Comma-separated job title keywords
  SEARCH_LOCATION: REPLACE          # Location filter
  EXCLUDE_KEYWORDS: REPLACE         # Comma-separated keywords to exclude
